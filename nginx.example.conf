# ═══════════════════════════════════════════════════════════════════
# ERRORES COMUNES que causan 500 Internal Server Error
# ═══════════════════════════════════════════════════════════════════
#
# 1. Proxy al puerto 3099 (React dev) en producción
#    → Usar puerto 5000 (backend) con SERVE_FRONTEND=true
#
# 2. Opción B con root apuntando a una carpeta que NO existe
#    → Verificar: ls /ruta/al/build/index.html
#
# 3. Mezclar Opción A + B (proxy completo Y try_files a la vez)
#    → Elegir solo una
#
# 4. Backend no corriendo
#    → Suele dar 502, pero a veces 500 según el proxy
#    → Verificar: curl http://127.0.0.1:5000/api/health
#
# 5. Build no generado
#    → npm run build antes de iniciar con SERVE_FRONTEND=true
#
# 6. Custom nginx en NPM con syntax error
#    → Revisar logs: docker logs npm  (o /var/log/nginx/error.log)
