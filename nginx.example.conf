# Configuración nginx / OpenResty para DynQR
#
# Hay DOS formas válidas de desplegar. Elegí UNA sola.
#
# ═══════════════════════════════════════════════════════════════════
# OPCIÓN A — RECOMENDADA si usás Nginx Proxy Manager / OpenResty
# Proxy TODO el dominio al backend Node (puerto 5000)
# ═══════════════════════════════════════════════════════════════════
#
# Requisitos en el servidor:
#   1. npm run build          (genera frontend/build)
#   2. En .env: SERVE_FRONTEND=true
#   3. npm run backend        (Express sirve build + /api)
#
# En Nginx Proxy Manager (UI):
#   - Domain: dynqr.sector7gp.com
#   - Forward Hostname: 127.0.0.1  (o IP del servidor, ej. 10.10.7.10)
#   - Forward Port: 5000
#   - Scheme: http
#   - Block Common Exploits: ON
#   - Websockets Support: OFF
#   - NO agregues location /api/ manual — el proxy va entero al puerto 5000
#
# Si usás nginx manual (sin NPM), bloque server completo:

server {
    listen 80;
    server_name dynqr.sector7gp.com;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ═══════════════════════════════════════════════════════════════════
# OPCIÓN B — nginx sirve archivos estáticos + proxy solo /api/
# Usar SOLO si tenés acceso directo al nginx del servidor
# ═══════════════════════════════════════════════════════════════════
#
# Requisitos:
#   1. npm run build
#   2. Copiar/servir frontend/build desde la ruta root de abajo
#   3. Backend corriendo en puerto 5000
#   4. REACT_APP_API_URL vacío al compilar
#
# ⚠️  NO mezclar con Opción A. Si NPM ya hace proxy al puerto 5000,
#     NO uses esta config adicional.

